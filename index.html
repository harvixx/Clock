<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --card-width: clamp(100px, 22vw, 220px);
    --card-height: clamp(90px, 20vw, 200px);
    --font-size: clamp(75px, 17vw, 170px);
    --colon-size: clamp(40px, 9vw, 90px);
    --card-radius: calc(var(--card-width) * 0.1);
    --ampm-size: clamp(10px, 2vw, 18px);
    --ampm-top: clamp(6px, 1.5vw, 14px);
    --ampm-left: clamp(8px, 2vw, 18px);
  }

  /* Target mobile portrait mode (specifically Realme Narzo 70 Pro viewport (~390px - 412px wide)) */
  @media (max-width: 600px) and (orientation: portrait) {
    /* HH:MM mode: size cards up to fill the screen width */
    #clock:not(.has-seconds) {
      --card-width: clamp(140px, 43vw, 240px);
      --card-height: clamp(125px, 38vw, 215px);
      --font-size: clamp(105px, 32vw, 180px);
      --colon-size: clamp(60px, 18vw, 100px);
      --ampm-size: 15px;
      --ampm-top: 10px;
      --ampm-left: 12px;
    }
    
    /* HH:MM:SS mode: slightly smaller to fit 3 cards + colons without wrapping */
    #clock.has-seconds {
      --card-width: clamp(80px, 24vw, 130px);
      --card-height: clamp(72px, 21.5vw, 115px);
      --font-size: clamp(60px, 18vw, 98px);
      --colon-size: clamp(30px, 9vw, 55px);
      --ampm-size: 9px;
      --ampm-top: 5px;
      --ampm-left: 7px;
    }
  }

  /* Target mobile landscape mode (specifically Realme Narzo 70 Pro (~400px high)) */
  @media (orientation: landscape) and (max-height: 600px) {
    #clock {
      --card-width: clamp(100px, 52vh, 250px);
      --card-height: clamp(90px, 47vh, 225px);
      --font-size: clamp(75px, 39vh, 190px);
      --colon-size: clamp(35px, 20vh, 100px);
      --ampm-size: clamp(10px, 4.5vh, 20px);
      --ampm-top: clamp(6px, 3vh, 14px);
      --ampm-left: clamp(8px, 4vh, 18px);
    }
  }

  body {
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    user-select: none;
  }

  #clock-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(20px, 4vw, 40px);
    width: 100%;
    padding: 20px;
  }

  #date-display {
    color: #444;
    font-size: clamp(12px, 3vw, 16px);
    font-family: Arial, sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: opacity 0.5s ease;
  }

  #clock {
    display: flex;
    align-items: center;
    gap: clamp(6px, 2vw, 16px);
    flex-wrap: nowrap;
  }

  .flip-card {
    position: relative;
    width: var(--card-width);
    height: var(--card-height);
    border-radius: var(--card-radius);
    background: #1c1c1c;
    border: 1px solid rgba(255, 255, 255, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
  }

  .flip-card::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 3px;
    background: #000000;
    z-index: 10;
    transform: translateY(-50%);
  }

  .flip-card::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 50%;
    background: rgba(0, 0, 0, 0.12);
    z-index: 1;
    border-radius: var(--card-radius) var(--card-radius) 0 0;
  }

  .flip-num {
    font-size: var(--font-size);
    font-weight: 900;
    color: #e2e2e2;
    line-height: 1;
    letter-spacing: -0.06em;
    z-index: 5;
    position: relative;
  }

  .am-pm {
    position: absolute;
    top: var(--ampm-top);
    left: var(--ampm-left);
    font-size: var(--ampm-size);
    color: #666;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    letter-spacing: 0.5px;
    z-index: 6;
  }

  .colon {
    font-size: var(--colon-size);
    font-weight: 900;
    color: #222;
    line-height: 1;
    margin-bottom: clamp(0px, 0vw, 0px);
    align-self: center;
  }

  .flip-card.flip {
    animation: flipAnim 0.35s ease;
  }

  @keyframes flipAnim {
    0%   { transform: scaleY(1); }
    30%  { transform: scaleY(0.92); }
    60%  { transform: scaleY(0.96); }
    100% { transform: scaleY(1); }
  }

  /* Controls — fade in/out */
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: center;
    opacity: 1;
    transition: opacity 0.6s ease;
    pointer-events: auto;
  }

  #controls.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #date-display.hidden {
    opacity: 0;
  }

  .ctrl-group {
    display: flex;
    background: #1a1a1a;
    border-radius: 50px;
    border: 1px solid #2a2a2a;
    overflow: hidden;
  }

  .ctrl-btn {
    background: transparent;
    border: none;
    color: #555;
    font-size: clamp(11px, 2.5vw, 13px);
    font-family: Arial, sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .ctrl-btn:hover { background: #262626; color: #999; }
  .ctrl-btn.active { background: #303030; color: #e0e0e0; }

  .fullscreen-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 50px;
    color: #555;
    font-size: clamp(11px, 2.5vw, 13px);
    font-family: Arial, sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .fullscreen-btn:hover { background: #262626; color: #999; }

  .fullscreen-btn svg {
    width: 14px; height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="clock-wrapper">
  <div id="date-display"></div>
  <div id="clock"></div>
  <div id="controls">
    <div class="ctrl-group">
      <button class="ctrl-btn active" id="btn-12h" onclick="setMode('12h')">12H</button>
      <button class="ctrl-btn" id="btn-24h" onclick="setMode('24h')">24H</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn active" id="btn-hm" onclick="setSeconds(false)">HH:MM</button>
      <button class="ctrl-btn" id="btn-hms" onclick="setSeconds(true)">HH:MM:SS</button>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">
      <svg id="fs-icon" viewBox="0 0 24 24">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      FULLSCREEN
    </button>
  </div>
</div>

<script>
  let mode = '12h';
  let showSeconds = false;
  let prevVals = {};
  let hideTimer = null;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function pad(n) { return String(n).padStart(2, '0'); }

  // Auto-hide controls after 5s of no interaction
  function resetHideTimer() {
    const ctrl = document.getElementById('controls');
    const date = document.getElementById('date-display');
    ctrl.classList.remove('hidden');
    date.classList.remove('hidden');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      ctrl.classList.add('hidden');
      date.classList.add('hidden');
    }, 5000);
  }

  // Show on any click/touch/move
  document.addEventListener('click', resetHideTimer);
  document.addEventListener('touchstart', resetHideTimer);
  document.addEventListener('mousemove', resetHideTimer);

  function buildClock() {
    const clock = document.getElementById('clock');
    clock.innerHTML = '';

    if (showSeconds) {
      clock.classList.add('has-seconds');
    } else {
      clock.classList.remove('has-seconds');
    }

    const parts = showSeconds ? ['h1','col1','m1','col2','s1'] : ['h1','col1','m1'];

    parts.forEach(id => {
      if (id.startsWith('col')) {
        const c = document.createElement('div');
        c.className = 'colon';
        c.id = id;
        c.textContent = ':';
        clock.appendChild(c);
      } else {
        const card = document.createElement('div');
        card.className = 'flip-card';
        card.id = id;

        if (id === 'h1' && mode === '12h') {
          const ap = document.createElement('div');
          ap.className = 'am-pm';
          ap.id = 'ampm-label';
          card.appendChild(ap);
        }

        const num = document.createElement('div');
        num.className = 'flip-num';
        num.id = id + '-num';
        num.textContent = '00';
        card.appendChild(num);

        clock.appendChild(card);
      }
    });

    prevVals = {};
  }

  function updateCard(id, val) {
    if (prevVals[id] === val) return;
    prevVals[id] = val;
    const numEl = document.getElementById(id + '-num');
    const card = document.getElementById(id);
    if (!numEl || !card) return;
    numEl.textContent = val;
    card.classList.remove('flip');
    void card.offsetWidth;
    card.classList.add('flip');
  }

  function tick() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    let ap = '';

    if (mode === '12h') {
      ap = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
    }

    updateCard('h1', pad(h));
    updateCard('m1', pad(m));
    if (showSeconds) updateCard('s1', pad(s));

    const apEl = document.getElementById('ampm-label');
    if (apEl) apEl.textContent = ap;

    const dateEl = document.getElementById('date-display');
    const d = now;
    dateEl.textContent = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btn-12h').classList.toggle('active', m === '12h');
    document.getElementById('btn-24h').classList.toggle('active', m === '24h');
    buildClock(); tick();
  }

  function setSeconds(show) {
    showSeconds = show;
    document.getElementById('btn-hm').classList.toggle('active', !show);
    document.getElementById('btn-hms').classList.toggle('active', show);
    buildClock(); tick();
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      document.getElementById('fs-icon').innerHTML = `
        <path d="M8 3v3a2 2 0 0 1-2 2H3"/>
        <path d="M21 8h-3a2 2 0 0 1-2-2V3"/>
        <path d="M3 16h3a2 2 0 0 1 2 2v3"/>
        <path d="M16 21v-3a2 2 0 0 1 2-2h3"/>`;
    } else {
      document.exitFullscreen();
      document.getElementById('fs-icon').innerHTML = `
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>`;
    }
  }

  buildClock();
  tick();
  setInterval(tick, 1000);
  resetHideTimer();
</script>
</body>
</html>
